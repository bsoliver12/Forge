<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FORGE</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FORGE">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#08080c">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,900;1,900&family=Barlow:wght@300;400&family=Courier+Prime:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08080c;--iron:#18181f;--steel:#22222c;--ash:#44445a;
  --mist:#7a7a96;--chalk:#c0c0d8;--white:#eeeef8;--amber:#f5a623;
}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(245,166,35,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(245,166,35,.03) 1px,transparent 1px);background-size:40px 40px;z-index:0}
.bg-glow{position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 60%,rgba(245,166,35,.07) 0%,transparent 70%);z-index:0;animation:pulse 4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
.scanline{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.08) 3px,rgba(0,0,0,.08) 4px);z-index:1;pointer-events:none}
.corner{position:fixed;width:20px;height:20px;z-index:3;opacity:.4}
.corner-tl{top:16px;left:16px;border-top:1px solid var(--amber);border-left:1px solid var(--amber)}
.corner-tr{top:16px;right:16px;border-top:1px solid var(--amber);border-right:1px solid var(--amber)}
.corner-bl{bottom:16px;left:16px;border-bottom:1px solid var(--amber);border-left:1px solid var(--amber)}
.corner-br{bottom:16px;right:16px;border-bottom:1px solid var(--amber);border-right:1px solid var(--amber)}
.container{position:relative;z-index:2;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px 40px}
.eyebrow{font-family:'Courier Prime',monospace;font-size:11px;color:var(--amber);letter-spacing:3px;text-transform:uppercase;margin-bottom:20px;animation:fadeUp .6s .2s ease both}
.logo-wrap{position:relative;margin-bottom:8px;animation:fadeUp .7s .35s ease both}
.logo-ring{position:absolute;inset:-18px;border:1px solid rgba(245,166,35,.25);border-radius:50%;animation:spin 20s linear infinite}
.logo-ring::before{content:'';position:absolute;top:-3px;left:50%;transform:translateX(-50%);width:6px;height:6px;background:var(--amber);border-radius:50%}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.logo-hex{width:100px;height:100px;background:linear-gradient(145deg,#18181f,#0f0f14);border:2px solid var(--amber);border-radius:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(245,166,35,.2),0 0 80px rgba(245,166,35,.08),inset 0 1px 0 rgba(245,166,35,.15)}
.logo-letter{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:64px;color:var(--amber);line-height:1;text-shadow:0 0 30px rgba(245,166,35,.5)}
.title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(52px,18vw,80px);color:var(--white);line-height:.9;text-align:center;margin-top:24px;animation:fadeUp .7s .5s ease both}
.title span{color:var(--amber);display:block;font-style:italic}
.subtitle{font-size:13px;color:var(--mist);letter-spacing:2px;text-transform:uppercase;text-align:center;margin-top:14px;font-weight:300;animation:fadeUp .7s .65s ease both}
.stats{display:flex;align-items:center;gap:20px;margin-top:28px;animation:fadeUp .7s .8s ease both}
.stat{text-align:center}
.stat-num{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;color:var(--amber);line-height:1}
.stat-label{font-size:10px;color:var(--ash);letter-spacing:1px;text-transform:uppercase;margin-top:3px}
.stat-div{width:1px;height:28px;background:var(--steel)}
.cta-wrap{width:100%;max-width:340px;margin-top:40px;animation:fadeUp .7s .95s ease both}
.cta-btn{display:flex;align-items:center;justify-content:space-between;width:100%;background:var(--amber);border:none;border-radius:14px;padding:20px 24px;cursor:pointer;text-decoration:none;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(245,166,35,.3),0 2px 8px rgba(0,0,0,.4);-webkit-tap-highlight-color:transparent}
.cta-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 50%)}
.cta-btn:active{transform:scale(.97)}
.cta-label{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:#08080c;letter-spacing:1px;line-height:1}
.cta-sub{font-size:12px;color:rgba(8,8,12,.6);margin-top:3px}
.cta-arrow{width:40px;height:40px;background:rgba(8,8,12,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cta-arrow svg{width:20px;height:20px}
.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:340px;margin-top:12px;animation:fadeUp .7s 1.1s ease both}
.quick-card{background:var(--iron);border:1px solid var(--steel);border-radius:12px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;text-decoration:none;-webkit-tap-highlight-color:transparent}
.quick-card:active{background:var(--steel);border-color:var(--amber)}
.quick-icon{font-size:20px;line-height:1}
.quick-label{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;color:var(--chalk);letter-spacing:.5px;text-transform:uppercase;text-align:center}
.ver{margin-top:32px;font-family:'Courier Prime',monospace;font-size:10px;color:var(--ash);letter-spacing:2px;animation:fadeUp .7s 1.25s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="scanline"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>
<div class="container">
  <div class="eyebrow">// v2.4 &middot; Home Gym Edition</div>
  <div class="logo-wrap">
    <div class="logo-ring"></div>
    <div class="logo-hex"><span class="logo-letter">F</span></div>
  </div>
  <div class="title">FORGE<span>Protocol</span></div>
  <div class="subtitle">12-Week &middot; Hypertrophy + Metabolic + Mobility</div>
  <div class="stats">
    <div class="stat"><div class="stat-num">12</div><div class="stat-label">Weeks</div></div>
    <div class="stat-div"></div>
    <div class="stat"><div class="stat-num">3</div><div class="stat-label">Phases</div></div>
    <div class="stat-div"></div>
    <div class="stat"><div class="stat-num">5+</div><div class="stat-label">Days/Wk</div></div>
    <div class="stat-div"></div>
    <div class="stat"><div class="stat-num">230g</div><div class="stat-label">Protein</div></div>
  </div>
  <div class="cta-wrap">
    <a class="cta-btn" href="protocol.html">
      <div>
        <div class="cta-label">OPEN PROTOCOL</div>
        <div class="cta-sub">Full program &middot; All sections</div>
      </div>
      <div class="cta-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="#08080c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>
    </a>
  </div>
  <div class="quick-grid">
    <a class="quick-card" href="protocol.html#training"><div class="quick-icon">&#127947;</div><div class="quick-label">Training</div></a>
    <a class="quick-card" href="protocol.html#nutrition"><div class="quick-icon">&#129385;</div><div class="quick-label">Nutrition</div></a>
    <a class="quick-card" href="protocol.html#compounds"><div class="quick-icon">&#9879;</div><div class="quick-label">Compounds</div></a>
    <a class="quick-card" href="protocol.html#mobility"><div class="quick-icon">&#129495;</div><div class="quick-label">Mobility</div></a>
    <a class="quick-card" href="protocol.html#shoulder"><div class="quick-icon">&#128170;</div><div class="quick-label">Shoulder</div></a>
    <a class="quick-card" href="protocol.html#tracking"><div class="quick-icon">&#128202;</div><div class="quick-label">Tracking</div></a>
  </div>
  <div class="ver">FORGE &middot; v2.4 &middot; 45M &middot; 205 LBS &middot; 18% BF</div>
</div>
</body>
</html>
